version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rdns_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-rdns_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rdns_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: rdns_mosquitto
    restart: always
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  api:
    build: .
    container_name: rdns_api
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=${PORT:-3000}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-rdns_db}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - GEOIP_DB_PATH=${GEOIP_DB_PATH:-/usr/src/app/src/geoip/GeoLite2-City.mmdb}
      - JWT_SECRET=${JWT_SECRET:-super_secreto_key_radio_dns_123}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-adminpassword}
      - STOMP_HOST=rdns_activemq
      - STOMP_PORT=${STOMP_PORT:-61613}
      - STOMP_USE_TLS=${STOMP_USE_TLS:-false}
      - STOMP_USER=${STOMP_USER:-admin}
      - STOMP_PASSWORD=${STOMP_PASSWORD:-adminpassword}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - postgres
      - redis
      - mosquitto
      - activemq

  activemq:
    image: rmohr/activemq:5.15.9
    container_name: rdns_activemq
    restart: always
    ports:
      - "61613:61613" # STOMP
      - "61616:61616" # OpenWire
      - "8161:8161"   # Web Console

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
