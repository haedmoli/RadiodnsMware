persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# Puerto TCP estándar para MQTT
listener 1883 0.0.0.0
allow_anonymous true

# Puerto para MQTT sobre WebSockets (útil para el cliente web/HTML5 del visualizador)
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true
